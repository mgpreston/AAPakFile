name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.1)
        required: true

jobs:
  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0  # Full history required for Source Link

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AAPakFile/AAPakFile.csproj

      - name: Build
        run: >
          dotnet build AAPakFile/AAPakFile.csproj
          --no-restore
          --configuration Release

      - name: Pack
        run: >
          dotnet pack AAPakFile/AAPakFile.csproj
          --no-build
          --configuration Release
          --output ./nupkgs

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./nupkgs/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        run: >
          dotnet nuget push "./nupkgs/*.snupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate